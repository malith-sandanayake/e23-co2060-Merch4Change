<svg width="100%" viewBox="0 0 435.72 640" role="img" style="background: rgb(74, 36, 225); border-radius: 12px;" xmlns="http://www.w3.org/2000/svg">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Merch4Change Story 3 — Every Purchase Helps</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Bold amber circle with upward arrow cutout, surrounded by decorative dots and promise typography</desc>
  <defs>
    
    <mask id="arrowMask">
      <rect width="380" height="640" fill="white"/>
      <!-- arrow shaft -->
      <rect x="181" y="245" width="18" height="90" fill="black"/>
      <!-- arrowhead -->
      <polygon points="190,200 150,260 230,260" fill="black"/>
    </mask>
  </defs>

  <!-- EVERY PURCHASE heading -->
  <text x="190" y="56" font-family="Arial,sans-serif" font-weight="bold" font-size="42" fill="#FAF7F2" text-anchor="middle" letter-spacing="6" dominant-baseline="central" style="fill:rgb(250, 247, 242);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial, sans-serif;font-size:42px;font-weight:700;text-anchor:middle;dominant-baseline:central">EVERY PURCHASE</text>

  <!-- HELPS hero word -->
  <text x="190" y="108" font-family="Georgia,serif" font-weight="bold" font-style="italic" font-size="72" fill="#D4820A" text-anchor="middle" dominant-baseline="central" style="fill:rgb(212, 130, 10);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:72px;font-weight:700;font-style:italic;text-anchor:middle;dominant-baseline:central">HELPS</text>

