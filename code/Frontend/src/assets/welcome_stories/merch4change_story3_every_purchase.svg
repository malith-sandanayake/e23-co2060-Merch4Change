  <circle cx="190" cy="305" r="195" fill="none" stroke="#FAF7F2" stroke-width="1" opacity=".12" style="fill:none;stroke:rgb(250, 247, 242);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.12;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

