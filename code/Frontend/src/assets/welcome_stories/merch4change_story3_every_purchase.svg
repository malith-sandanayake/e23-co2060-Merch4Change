  <!-- Bottom text -->
  <text x="190" y="488" font-family="Arial,sans-serif" font-weight="300" font-size="22" fill="#FAF7F2" opacity=".75" text-anchor="middle" letter-spacing="1" dominant-baseline="central" style="fill:rgb(250, 247, 242);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial, sans-serif;font-size:22px;font-weight:300;text-anchor:middle;dominant-baseline:central">All proceeds go directly</text>
  <text x="190" y="514" font-family="Arial,sans-serif" font-weight="300" font-size="22" fill="#FAF7F2" opacity=".75" text-anchor="middle" letter-spacing="1" dominant-baseline="central" style="fill:rgb(250, 247, 242);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial, sans-serif;font-size:22px;font-weight:300;text-anchor:middle;dominant-baseline:central">to the cause you choose.</text>

