<svg width="100%" viewBox="0 0 490 650" role="img" style="background: rgb(74, 36, 225); border-radius: 12px;" xmlns="http://www.w3.org/2000/svg">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Merch4Change Story 1 — Welcome</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Animated welcome story card with concentric circles and brand typography on deep violet purple background</desc>
  <defs>
    
  </defs>

  <!-- Corner arcs -->
  <path d="M0,120 A120,120 0 0,1 120,0" fill="none" stroke="#FAF7F2" stroke-width="10" opacity=".1" style="fill:none;stroke:rgb(250, 247, 242);color:rgb(255, 255, 255);stroke-width:10px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M380,120 A120,120 0 0,0 260,0" fill="none" stroke="#FAF7F2" stroke-width="10" opacity=".1" style="fill:none;stroke:rgb(250, 247, 242);color:rgb(255, 255, 255);stroke-width:10px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M0,520 A120,120 0 0,0 120,640" fill="none" stroke="#FAF7F2" stroke-width="10" opacity=".1" style="fill:none;stroke:rgb(250, 247, 242);color:rgb(255, 255, 255);stroke-width:10px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M380,520 A120,120 0 0,1 260,640" fill="none" stroke="#FAF7F2" stroke-width="10" opacity=".1" style="fill:none;stroke:rgb(250, 247, 242);color:rgb(255, 255, 255);stroke-width:10px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Concentric circles - outer (slow spin) -->
  <g style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <circle cx="190" cy="282" r="290" fill="none" stroke="#FAF7F2" stroke-width="1.5" stroke-dasharray="8 6" opacity=".25" style="fill:none;stroke:rgb(250, 247, 242);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-dasharray:8px, 6px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.25;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <circle cx="190" cy="282" r="190" fill="none" stroke="#FAF7F2" stroke-width="1.5" style="fill:none;stroke:rgb(250, 247, 242);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <circle cx="190" cy="282" r="90" fill="none" stroke="#FAF7F2" stroke-width="1.5" stroke-dasharray="4 4" opacity=".6" style="fill:none;stroke:rgb(250, 247, 242);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-dasharray:4px, 4px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>

  <!-- Tick marks on outer ring (counter-spin to stay still visually) -->
  <g style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <circle cx="190" cy="92" r="4" fill="#FAF7F2" opacity=".4" style="fill:rgb(250, 247, 242);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <circle cx="190" cy="472" r="4" fill="#FAF7F2" opacity=".4" style="fill:rgb(250, 247, 242);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <circle cx="0" cy="282" r="4" fill="#FAF7F2" opacity=".4" style="fill:rgb(250, 247, 242);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <circle cx="380" cy="282" r="4" fill="#FAF7F2" opacity=".4" style="fill:rgb(250, 247, 242);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>

  <!-- Center dot -->
  <circle cx="190" cy="282" fill="#D4820A" opacity=".0" style="fill:rgb(212, 130, 10);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <animate attributeName="r" values="0;10;8" dur=".5s" begin=".2s" fill="freeze" style="fill:rgb(212, 130, 10);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <animate attributeName="opacity" values="0;1;1" dur=".5s" begin=".2s" fill="freeze" style="fill:rgb(212, 130, 10);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </circle>
  <!-- Cross hairs through center -->
  <line x1="174" y1="282" x2="206" y2="282" stroke="#FAF7F2" stroke-width="1" opacity=".3" style="fill:rgb(0, 0, 0);stroke:rgb(250, 247, 242);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="190" y1="266" x2="190" y2="298" stroke="#FAF7F2" stroke-width="1" opacity=".3" style="fill:rgb(0, 0, 0);stroke:rgb(250, 247, 242);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- WELCOME -->
  <text x="190" y="398" font-family="Georgia, serif" font-weight="bold" font-size="52" fill="#FAF7F2" text-anchor="middle" letter-spacing="8" dominant-baseline="central" style="fill:rgb(250, 247, 242);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:52px;font-weight:700;text-anchor:middle;dominant-baseline:central">WELCOME</text>

  <!-- to Merch4Change -->
  <text x="190" y="445" font-family="Georgia, serif" font-style="italic" font-size="34" fill="#D4820A" text-anchor="middle" dominant-baseline="central" style="fill:rgb(212, 130, 10);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:34px;font-weight:400;font-style:italic;text-anchor:middle;dominant-baseline:central">to Merch4Change</text>

  <!-- tagline -->
  <text x="190" y="500" font-family="Arial, sans-serif" font-weight="300" font-size="20" fill="#FAF7F2" opacity=".7" text-anchor="middle" letter-spacing="4" dominant-baseline="central" style="fill:rgb(250, 247, 242);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial, sans-serif;font-size:20px;font-weight:300;text-anchor:middle;dominant-baseline:central">SHOP. GIVE. CHANGE.</text>

  <!-- Bottom rule -->
  <line x1="20" y1="620" x2="360" y2="620" stroke="#FAF7F2" stroke-width="1" opacity=".15" style="fill:rgb(0, 0, 0);stroke:rgb(250, 247, 242);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.15;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

</svg>